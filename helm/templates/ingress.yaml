apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: { { .Chart.Name } }

spec:
  rules:
    - host: devops.local

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: { { .Chart.Name } }
                port:
                  number: 80
